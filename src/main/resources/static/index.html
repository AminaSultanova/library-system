<!DOCTYPE html>
<html>
<head>
    <title>Library System</title>
</head>
<body>

<h1>Library System</h1>

<h2>Add / Update Book</h2>

<input id="title" placeholder="Title">
<input id="author" placeholder="Author">
<input id="year" placeholder="Year">

<button onclick="addBook()">Add Book</button>
<button onclick="updateBook()">Update Book</button>

<h2>Books</h2>

<ul id="bookList"></ul>

<script>

    let currentBookId = null;

    function loadBooks() {

        fetch("/api/books")
            .then(response => response.json())
            .then(data => {

                const list = document.getElementById("bookList");
                list.innerHTML = "";

                data.forEach(book => {

                    const li = document.createElement("li");

                    li.innerHTML =
                        book.title + " - " + book.author + " (" + book.publicationYear + ") " +
                        "<button onclick='editBook(" + book.id + ", \"" + book.title + "\", \"" + book.author + "\", " + book.publicationYear + ")'>Edit</button> " +
                        "<button onclick='deleteBook(" + book.id + ")'>Delete</button>";

                    list.appendChild(li);

                });

            });

    }

    function addBook() {

        const title = document.getElementById("title").value;
        const author = document.getElementById("author").value;
        const year = document.getElementById("year").value;

        fetch("/api/books", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title,
                author: author,
                publicationYear: year
            })
        })
        .then(() => {
            clearForm();
            loadBooks();
        });

    }

    function editBook(id, title, author, year) {

        currentBookId = id;

        document.getElementById("title").value = title;
        document.getElementById("author").value = author;
        document.getElementById("year").value = year;

    }

    function updateBook() {

        if (currentBookId == null) {
            alert("Select a book to edit first");
            return;
        }

        const title = document.getElementById("title").value;
        const author = document.getElementById("author").value;
        const year = document.getElementById("year").value;

        fetch("/api/books/" + currentBookId, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title,
                author: author,
                publicationYear: year
            })
        })
        .then(() => {
            clearForm();
            loadBooks();
        });

    }

    function deleteBook(id) {

        fetch("/api/books/" + id, {
            method: "DELETE"
        })
        .then(() => loadBooks());

    }

    function clearForm() {

        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("year").value = "";

        currentBookId = null;

    }

    loadBooks();

</script>

</body>
</html>
